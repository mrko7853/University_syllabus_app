<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="height=device-height, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="application-name" content="ILA Companion">
  <meta name="apple-mobile-web-app-title" content="ILA Companion">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <meta name="msapplication-TileColor" content="#0f172a">
  <meta name="msapplication-TileImage" content="/assets/mstile-150x150.png">
  <meta name="msapplication-config" content="/assets/browserconfig.xml">
  <meta name="format-detection" content="telephone=no">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="shortcut icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="mask-icon" href="/assets/logo-symbol.svg" color="#0f172a">
  <link rel="manifest" href="/assets/site.webmanifest">

  <title>Timetable - ILA Companion</title>
  <meta name="description" content="Manage your class schedule with ILA Companion timetable and keep your week organized at a glance.">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="author" content="ILA Companion">
  <meta name="keywords" content="student timetable, class schedule planner, weekly schedule">
  <link rel="canonical" href="https://ilacompanion.app/timetable/">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ILA Companion">
  <meta property="og:title" content="Timetable - ILA Companion">
  <meta property="og:description" content="Manage your class schedule with ILA Companion timetable and keep your week organized at a glance.">
  <meta property="og:url" content="https://ilacompanion.app/timetable/">
  <meta property="og:image" content="https://ilacompanion.app/assets/app-icon.png">
  <meta property="og:image:alt" content="ILA Companion app icon">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Timetable - ILA Companion">
  <meta name="twitter:description" content="Manage your class schedule with ILA Companion timetable and keep your week organized at a glance.">
  <meta name="twitter:image" content="https://ilacompanion.app/assets/app-icon.png">

  <link rel="stylesheet" href="css/blaze.css">
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/shared.js"></script>
  <script type="module" src="js/calendar-page-component.js"></script>
  <script type="module" src="js/router.js"></script>
</head>

<body>

  <app-navigation></app-navigation>
  <div class="app-header app-header--title-mode">
    <div class="app-header-brand">
      <div class="app-logo"></div>
      <h1 class="app-mobile-page-title" aria-live="polite">Timetable</h1>
    </div>
    <div class="app-misc">
      <button id="profile-mobile" type="button" data-route="/profile" aria-label="Profile"></button>
    </div>
  </div>

  <div id="app-content" class="ui-page">

    <!-- Search modal (shared component) -->
    <div class="search-container hidden">
      <div class="search-background">
        <div class="ui-swipe-sheet search-modal">
          <div class="swipe-indicator ui-swipe-sheet__handle"></div>
          <h2>
            <div></div>Search Courses
          </h2>
          <div class="search-input-container">
            <input type="text" class="search-input" id="search-input"
              placeholder="Enter course title, professor name, or course code..." autocomplete="off">
            <div class="search-autocomplete" id="search-autocomplete"></div>
          </div>
          <div class="search-buttons">
            <button class="search-submit" id="search-submit">Search</button>
            <button class="search-cancel" id="search-cancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <section id="course-summary" class="calendar-page-modern">

      <!-- Calendar toolbar (desktop) -->
      <div class="container-above container-above-desktop">
        <div class="calendar-toolbar-shell">
          <div id="filter-year-term">
            <div class="filter-year-term-container">
              <div class="ui-select custom-select" data-target="semester-select">
                <div class="ui-select__trigger custom-select-trigger control-surface control-surface--primary" tabindex="0">
                  <span class="ui-select__value custom-select-value">Loading...</span>
                  <div class="ui-select__arrow custom-select-arrow"></div>
                </div>
                <div class="ui-select__menu custom-select-options">
                  <!-- Options populated dynamically from database -->
                </div>
              </div>
              <select name="semester" id="semester-select" class="semester-select" style="display: none;">
                <!-- Options populated dynamically from database -->
              </select>
            </div>
          </div>

          <div class="calendar-toolbar-center" role="tablist" aria-label="Timetable view">
            <button type="button" id="calendar-view-week" class="ui-segment__item ui-pill ui-pill--filter calendar-view-btn is-active"
              aria-selected="true" data-calendar-view="week">Week</button>
            <button type="button" id="calendar-view-day" class="ui-segment__item ui-pill ui-pill--filter calendar-view-btn"
              aria-selected="false" data-calendar-view="day">Day</button>
            <button type="button" id="calendar-view-list" class="ui-segment__item ui-pill ui-pill--filter calendar-view-btn"
              aria-selected="false" data-calendar-view="list">List</button>
          </div>

          <div class="calendar-toolbar-right">
            <div class="ui-segment calendar-zoom-controls" id="calendar-zoom-controls" aria-label="Week zoom controls">
              <button type="button" id="calendar-zoom-out"
                class="ui-segment__item ui-pill ui-pill--filter calendar-zoom-btn calendar-zoom-btn--step"
                data-calendar-zoom-action="out" aria-label="Zoom out">
                <span aria-hidden="true">-</span>
              </button>
              <button type="button" id="calendar-zoom-reset"
                class="ui-segment__item ui-pill ui-pill--filter calendar-zoom-btn calendar-zoom-btn--readout"
                data-calendar-zoom-action="reset" aria-label="Reset zoom to 100%">
                100%
              </button>
              <button type="button" id="calendar-zoom-in"
                class="ui-segment__item ui-pill ui-pill--filter calendar-zoom-btn calendar-zoom-btn--step"
                data-calendar-zoom-action="in" aria-label="Zoom in">
                <span aria-hidden="true">+</span>
              </button>
            </div>
            <button type="button" id="calendar-filter-trigger" class="ui-btn ui-btn--secondary calendar-filter-trigger control-surface control-surface--secondary"
              aria-haspopup="dialog" aria-expanded="false">
              <span class="calendar-filter-trigger-icon" aria-hidden="true"></span>
              <span class="calendar-filter-trigger-label">Filters</span>
            </button>
          </div>
        </div>
      </div>

      <div id="calendar-filter-popover" class="filter-container hidden" role="dialog"
        aria-labelledby="calendar-filter-heading" aria-modal="true">
        <div class="filter-background" id="calendar-filter-background">
          <div class="ui-swipe-sheet filter-popup calendar-filter-popup">
            <div class="filter-header">
              <div class="swipe-indicator ui-swipe-sheet__handle"></div>
              <div class="filter-buttons">
                <button type="button" id="calendar-filter-see-results">See Results</button>
                <button type="button" id="calendar-filter-clear-all">Clear All</button>
              </div>
            </div>
            <div class="filter-content">
              <div id="filter-by-concentration" class="calendar-filter-group">
                <h3 class="filter-title" id="calendar-filter-heading">Course Type</h3>
                <div class="checkboxes-container" id="calendar-filter-type-group"></div>
              </div>
              <div id="calendar-filter-visibility" class="calendar-filter-group">
                <h3 class="filter-title">Visibility</h3>
                <div class="checkboxes-container">
                  <input type="checkbox" id="calendar-show-registered" class="filter-checkbox" checked>
                  <label for="calendar-show-registered">Show timetable courses</label>
                  <input type="checkbox" id="calendar-show-empty" class="filter-checkbox" checked>
                  <label for="calendar-show-empty">Show empty slots</label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="ui-page-content main-content">

        <!-- Mobile toolbar -->
        <div class="container-above container-above-mobile">
          <div class="calendar-toolbar-shell">
            <div id="filter-year-term-mobile">
              <div class="filter-year-term-container">
                <div class="ui-select custom-select" data-target="semester-select-mobile">
                  <div class="ui-select__trigger custom-select-trigger control-surface control-surface--primary" tabindex="0">
                    <span class="ui-select__value custom-select-value">Loading...</span>
                    <div class="ui-select__arrow custom-select-arrow"></div>
                  </div>
                  <div class="ui-select__menu custom-select-options">
                    <!-- Options populated dynamically from database -->
                  </div>
                </div>
                <select name="semester" id="semester-select-mobile" class="semester-select" style="display: none;">
                  <!-- Options populated dynamically from database -->
                </select>
              </div>
            </div>
            <div class="calendar-toolbar-center calendar-toolbar-center-mobile" role="tablist" aria-label="Timetable view">
              <button type="button" id="calendar-view-day-mobile" class="ui-segment__item ui-pill ui-pill--filter calendar-view-btn"
                aria-selected="false" data-calendar-view="day">Day</button>
              <button type="button" id="calendar-view-list-mobile" class="ui-segment__item ui-pill ui-pill--filter calendar-view-btn"
                aria-selected="false" data-calendar-view="list">List</button>
            </div>
            <button type="button" id="calendar-filter-trigger-mobile" class="ui-btn ui-btn--secondary calendar-filter-trigger control-surface control-surface--secondary"
              aria-haspopup="dialog" aria-expanded="false">
              <span class="calendar-filter-trigger-icon" aria-hidden="true"></span>
              <span class="calendar-filter-trigger-label">Filters</span>
            </button>
          </div>
        </div>

        <div class="main-container calendar-container" id="calendar-main-div">
          <calendar-page></calendar-page>
        </div>

        <!-- Hidden inputs for year/term values -->
        <input type="hidden" id="term-select" value="Fall">
        <input type="hidden" id="year-select" value="">

        <!-- Hidden placeholder for course list (required for initialization) -->
        <div id="course-list" style="display: none;"></div>
      </div>
    </section>

    <div class="class-info sheet courseinfo-sheet" id="class-info">
      <div class="class-info-header sheet-header courseinfo-header">
        <div class="swipe-indicator ui-swipe-sheet__handle courseinfo-grabber"></div>
        <div class="class-header">
          <button id="class-close"></button>
          <h2>Class Info</h2>
        </div>
      </div>

      <div class="courseinfo-peek" id="course-info-peek" aria-hidden="true"></div>

      <div class="class-content-wrapper sheet-body courseinfo-body">
        <div id="course-info-body">
          <div id="course-info-content-root"></div>
        </div>
      </div>
      <div class="sheet-footer" id="course-info-footer">
        <div id="course-info-actions">
          <button id="class-add-remove"></button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
