<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="height=device-height, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Course - ILA Companion</title>
  <link rel="stylesheet" href="css/blaze.css">
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/shared.js"></script>
  <script type="module" src="js/course-page.js"></script>
</head>

<body>
  <section id="syllabus-main">
    <div class="course-page is-loading" id="course-page">
      <div class="course-page-toolbar-shell">
        <div class="course-page-toolbar">
          <div class="course-page-toolbar-term" id="course-page-filter-year-term">
            <select class="semester-select" id="course-page-semester-select" aria-label="Select semester">
              <option value="">Loading...</option>
            </select>
            <div class="custom-select course-page-semester-custom-select" data-target="course-page-semester-select">
              <button type="button" class="custom-select-trigger control-surface control-surface--primary">
                <span class="custom-select-value">Loading...</span>
                <span class="custom-select-arrow" aria-hidden="true"></span>
              </button>
              <div class="custom-select-options"></div>
            </div>
          </div>

          <form class="course-page-toolbar-search" id="course-page-search-form" role="search">
            <button
              type="button"
              class="course-page-toolbar-search-trigger control-surface control-surface--primary"
              id="course-page-search-trigger"
              aria-label="Search courses"
              title="Search courses"
            >
              <span class="search-pill-icon" aria-hidden="true"></span>
            </button>
            <label class="search-pill control-surface control-surface--primary" for="course-page-search-input">
              <span class="search-pill-icon" aria-hidden="true"></span>
              <input
                type="text"
                id="course-page-search-input"
                class="search-pill-input"
                placeholder="Search courses..."
                autocomplete="off"
                spellcheck="false"
              >
            </label>
          </form>
        </div>
      </div>

      <div class="search-container hidden" id="course-page-search-container">
        <div class="search-background" id="course-page-search-background">
          <div class="search-modal" id="course-page-search-modal">
            <div class="swipe-indicator"></div>
            <h2>
              <div></div>Search Courses
            </h2>
            <div class="search-input-container">
              <input
                type="text"
                class="search-input"
                id="course-page-modal-search-input"
                placeholder="Enter course title, professor name, or course code..."
                autocomplete="off"
                spellcheck="false"
              >
              <div class="search-autocomplete" id="course-page-modal-search-autocomplete"></div>
            </div>
            <div class="search-buttons">
              <button class="search-submit" id="course-page-modal-search-submit">Search</button>
              <button class="search-cancel" id="course-page-modal-search-cancel">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <div class="course-page-card" id="course-page-card">
        <div class="course-page-skeleton" id="course-page-skeleton" aria-hidden="true">
          <section class="course-page-skeleton-card">
            <div class="course-page-skeleton-title-row">
              <span class="course-page-skeleton-dot"></span>
              <span class="course-page-skeleton-line course-page-skeleton-line-title"></span>
            </div>
            <div class="course-page-skeleton-badges">
              <span class="course-page-skeleton-chip"></span>
              <span class="course-page-skeleton-chip"></span>
              <span class="course-page-skeleton-chip"></span>
            </div>
          </section>
          <section class="course-page-skeleton-card">
            <span class="course-page-skeleton-line course-page-skeleton-line-heading"></span>
            <div class="course-page-skeleton-grid">
              <span class="course-page-skeleton-line"></span>
              <span class="course-page-skeleton-line"></span>
              <span class="course-page-skeleton-line"></span>
              <span class="course-page-skeleton-line"></span>
              <span class="course-page-skeleton-line"></span>
              <span class="course-page-skeleton-line"></span>
            </div>
          </section>
          <section class="course-page-skeleton-card">
            <span class="course-page-skeleton-line course-page-skeleton-line-heading"></span>
            <div class="course-page-skeleton-accordion">
              <span class="course-page-skeleton-accordion-row"></span>
              <span class="course-page-skeleton-accordion-row"></span>
              <span class="course-page-skeleton-accordion-row"></span>
            </div>
          </section>
        </div>

        <div class="class-info course-fullscreen sheet courseinfo-sheet" id="class-info">
          <div class="class-info-header sheet-header courseinfo-header">
            <div class="swipe-indicator courseinfo-grabber"></div>
            <div class="class-header" id="class-header-full">
              <button id="class-close">x</button>
              <h2>Class Info</h2>
            </div>
          </div>

          <div class="courseinfo-peek" id="course-info-peek" aria-hidden="true"></div>

          <div class="class-content-wrapper sheet-body courseinfo-body">
            <div id="course-info-body">
              <div id="course-info-content-root"></div>
            </div>
          </div>
          <div class="sheet-footer" id="course-info-footer">
            <div id="course-info-actions">
              <button id="class-add-remove"></button>
            </div>
          </div>
        </div>

        <div id="course-page-footer-dock" aria-hidden="true"></div>
      </div>
    </div>
  </section>
</body>

</html>
