<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="height=device-height, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="application-name" content="ILA Companion">
  <meta name="apple-mobile-web-app-title" content="ILA Companion">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <meta name="msapplication-TileColor" content="#0f172a">
  <meta name="msapplication-TileImage" content="/assets/mstile-150x150.png">
  <meta name="msapplication-config" content="/assets/browserconfig.xml">
  <meta name="format-detection" content="telephone=no">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="shortcut icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="mask-icon" href="/assets/logo-symbol.svg" color="#0f172a">
  <link rel="manifest" href="/assets/site.webmanifest">

  <title>Course - ILA Companion</title>
  <meta name="description" content="View detailed course information, evaluations, and student reviews on ILA Companion to make better enrollment decisions.">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="author" content="ILA Companion">
  <meta name="keywords" content="course details, class reviews, professor insights, student feedback, course evaluation">
  <link rel="canonical" href="https://ilacompanion.app/course/">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ILA Companion">
  <meta property="og:title" content="Course Details - ILA Companion">
  <meta property="og:description" content="View detailed course information, evaluations, and student reviews on ILA Companion to make better enrollment decisions.">
  <meta property="og:url" content="https://ilacompanion.app/course/">
  <meta property="og:image" content="https://ilacompanion.app/assets/app-icon.png">
  <meta property="og:image:alt" content="ILA Companion app icon">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Course Details - ILA Companion">
  <meta name="twitter:description" content="View detailed course information, evaluations, and student reviews on ILA Companion to make better enrollment decisions.">
  <meta name="twitter:image" content="https://ilacompanion.app/assets/app-icon.png">

  <link rel="stylesheet" href="css/blaze.css">
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/shared.js"></script>
  <script type="module" src="js/course-page.js"></script>
</head>

<body>
  <section id="syllabus-main">
    <div class="ui-page course-page is-loading" id="course-page">
      <div class="course-page-toolbar-shell">
        <div class="course-page-toolbar">
          <div class="course-page-toolbar-term" id="course-page-filter-year-term">
            <select class="semester-select" id="course-page-semester-select" aria-label="Select semester">
              <option value="">Loading...</option>
            </select>
            <div class="ui-select custom-select course-page-semester-custom-select" data-target="course-page-semester-select">
              <button type="button" class="ui-select__trigger custom-select-trigger control-surface control-surface--primary">
                <span class="ui-select__value custom-select-value">Loading...</span>
                <span class="ui-select__arrow custom-select-arrow" aria-hidden="true"></span>
              </button>
              <div class="ui-select__menu custom-select-options"></div>
            </div>
          </div>

          <form class="course-page-toolbar-search" id="course-page-search-form" role="search">
            <button
              type="button"
              class="ui-btn ui-btn--primary course-page-toolbar-search-trigger control-surface control-surface--primary"
              id="course-page-search-trigger"
              aria-label="Search courses"
              title="Search courses"
            >
              <span class="search-pill-icon" aria-hidden="true"></span>
            </button>
            <label class="search-pill control-surface control-surface--primary" for="course-page-search-input">
              <span class="search-pill-icon" aria-hidden="true"></span>
              <input
                type="text"
                id="course-page-search-input"
                class="search-pill-input"
                placeholder="Search courses..."
                autocomplete="off"
                spellcheck="false"
              >
            </label>
            <div class="search-pill-autocomplete" id="course-page-search-autocomplete"></div>
          </form>
        </div>
      </div>

      <div class="search-container hidden" id="course-page-search-container">
        <div class="search-background" id="course-page-search-background">
          <div class="ui-swipe-sheet search-modal" id="course-page-search-modal">
            <div class="swipe-indicator ui-swipe-sheet__handle"></div>
            <h2>
              <div></div>Search Courses
            </h2>
            <div class="search-input-container">
              <input
                type="text"
                class="search-input"
                id="course-page-modal-search-input"
                placeholder="Enter course title, professor name, or course code..."
                autocomplete="off"
                spellcheck="false"
              >
              <div class="search-autocomplete" id="course-page-modal-search-autocomplete"></div>
            </div>
            <div class="search-buttons">
              <button class="search-submit" id="course-page-modal-search-submit">Search</button>
              <button class="search-cancel" id="course-page-modal-search-cancel">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <div class="course-page-card" id="course-page-card">
        <div class="course-page-skeleton" id="course-page-skeleton" aria-hidden="true">
          <div class="course-page-skeleton-tabs">
            <span class="course-page-skeleton-tab is-active"></span>
            <span class="course-page-skeleton-tab"></span>
            <span class="course-page-skeleton-tab"></span>
          </div>

          <section class="course-page-skeleton-surface course-page-skeleton-surface--hero">
            <div class="course-page-skeleton-hero-row">
              <div class="course-page-skeleton-title-stack">
                <div class="course-page-skeleton-title-row">
                  <span class="course-page-skeleton-dot"></span>
                  <span class="course-page-skeleton-line course-page-skeleton-line-title"></span>
                </div>
                <span class="course-page-skeleton-line course-page-skeleton-line-subtitle"></span>
              </div>
              <div class="course-page-skeleton-hero-actions">
                <span class="course-page-skeleton-circle"></span>
                <span class="course-page-skeleton-circle"></span>
              </div>
            </div>
            <div class="course-page-skeleton-badges">
              <span class="course-page-skeleton-chip"></span>
              <span class="course-page-skeleton-chip"></span>
              <span class="course-page-skeleton-chip"></span>
            </div>
          </section>

          <section class="course-page-skeleton-surface course-page-skeleton-surface--details">
            <span class="course-page-skeleton-line course-page-skeleton-line-heading"></span>
            <div class="course-page-skeleton-detail-list">
              <div class="course-page-skeleton-detail-row">
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-label"></span>
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-value"></span>
              </div>
              <div class="course-page-skeleton-detail-row">
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-label"></span>
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-value"></span>
              </div>
              <div class="course-page-skeleton-detail-row">
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-label"></span>
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-value"></span>
              </div>
              <div class="course-page-skeleton-detail-row">
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-label"></span>
                <span class="course-page-skeleton-line course-page-skeleton-line-detail-value"></span>
              </div>
            </div>
          </section>

          <section class="course-page-skeleton-surface course-page-skeleton-surface--list">
            <span class="course-page-skeleton-line course-page-skeleton-line-heading"></span>
            <div class="course-page-skeleton-list">
              <span class="course-page-skeleton-list-row"></span>
              <span class="course-page-skeleton-list-row"></span>
              <span class="course-page-skeleton-list-row"></span>
            </div>
          </section>

          <div class="course-page-skeleton-footer" aria-hidden="true">
            <span class="course-page-skeleton-footer-btn course-page-skeleton-footer-btn--icon"></span>
            <span class="course-page-skeleton-footer-btn course-page-skeleton-footer-btn--secondary"></span>
            <span class="course-page-skeleton-footer-btn course-page-skeleton-footer-btn--primary"></span>
          </div>
        </div>

        <div class="class-info course-fullscreen sheet courseinfo-sheet" id="class-info">
          <div class="class-info-header sheet-header courseinfo-header">
            <div class="swipe-indicator ui-swipe-sheet__handle courseinfo-grabber"></div>
            <div class="class-header" id="class-header-full">
              <button id="class-close"></button>
              <h2>Class Info</h2>
            </div>
          </div>

          <div class="courseinfo-peek" id="course-info-peek" aria-hidden="true"></div>

          <div class="class-content-wrapper sheet-body courseinfo-body">
            <div id="course-info-body">
              <div id="course-info-content-root"></div>
            </div>
          </div>
          <div class="sheet-footer" id="course-info-footer">
            <div id="course-info-actions">
              <button id="class-add-remove"></button>
            </div>
          </div>
        </div>

        <div id="course-page-footer-dock" aria-hidden="true"></div>
      </div>
    </div>
  </section>
</body>

</html>
