<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="height=device-height, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="application-name" content="ILA Companion">
    <meta name="apple-mobile-web-app-title" content="ILA Companion">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="msapplication-TileColor" content="#0f172a">
    <meta name="msapplication-TileImage" content="/assets/mstile-150x150.png">
    <meta name="msapplication-config" content="/assets/browserconfig.xml">
    <meta name="format-detection" content="telephone=no">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="shortcut icon" href="/assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="mask-icon" href="/assets/logo-symbol.svg" color="#0f172a">
    <link rel="manifest" href="/assets/site.webmanifest">

    <title>Profile - ILA Companion</title>
    <meta name="description" content="Manage your ILA Companion account settings, preferences, and academic profile.">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="author" content="ILA Companion">
    <meta name="keywords" content="student profile, account settings, academic preferences">
    <link rel="canonical" href="https://ilacompanion.app/profile/">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ILA Companion">
    <meta property="og:title" content="Profile - ILA Companion">
    <meta property="og:description" content="Manage your ILA Companion account settings, preferences, and academic profile.">
    <meta property="og:url" content="https://ilacompanion.app/profile/">
    <meta property="og:image" content="https://ilacompanion.app/assets/app-icon.png">
    <meta property="og:image:alt" content="ILA Companion app icon">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Profile - ILA Companion">
    <meta name="twitter:description" content="Manage your ILA Companion account settings, preferences, and academic profile.">
    <meta name="twitter:image" content="https://ilacompanion.app/assets/app-icon.png">

    <link rel="stylesheet" href="css/blaze.css">
</head>

<body>
    <app-navigation></app-navigation>
    <div class="app-header app-header--title-mode">
        <div class="app-header-brand">
            <div class="app-logo"></div>
            <h1 class="app-mobile-page-title" aria-live="polite">Profile</h1>
        </div>
        <div class="app-misc">
            <button id="profile-mobile" type="button" data-route="/profile" aria-label="Profile"></button>
        </div>
    </div>

    <div id="app-content" class="ui-page">
        <main id="profile-main" class="page profile-page">
            <div class="profile-layout">
                <aside class="profile-sidebar" aria-label="Profile sections">
                    <nav class="profile-sidebar-nav" id="profile-sidebar-nav" aria-label="Profile sections"></nav>
                </aside>
                <div class="profile-content-shell">
                    <nav class="profile-mobile-sections" id="profile-mobile-sections" aria-label="Profile sections"></nav>
                    <div class="page-inner ui-page-content" id="profile-sections-content">
                        <section class="profile-section" id="profile-identity"></section>
                        <section class="profile-section" id="profile-academic"></section>
                        <section class="profile-section" id="profile-reviews"></section>
                        <section class="profile-section" id="profile-preferences"></section>
                        <section class="profile-section" id="profile-data-privacy"></section>
                        <section class="profile-section" id="profile-auth"></section>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/shared.js"></script>
    <script type="module" src="js/profile.js"></script>
    <script type="module" src="js/router.js"></script>
</body>
</html>
